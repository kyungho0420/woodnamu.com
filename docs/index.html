<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index,follow">
    <meta name="description" data-i18n="meta_description" content="모든 것을 한 페이지에 담아 드립니다.">
    <meta name="author" content="Maxim">
    <link rel="canonical" href="https://woodnamu.com/docs/">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" type="image/x-icon" href="https://cdn.maxim.pe.kr/_image/seo/sigonggan/favicon.ico"/>
    <link rel="apple-touch-icon" href="https://cdn.maxim.pe.kr/_image/seo/sigonggan/logo.png">

    <!-- Damso V4 Core -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/core/core.css">
    <script src="https://dev.dam.so/_inc/ex/v4/core/core.js"></script>

    <!-- Damso V4 View: Page -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/view/page.css">
    <script src="https://dev.dam.so/_inc/ex/v4/view/page.js"></script>

    <!-- Damso V4 Plug: Canvas -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/plug/canvas.css">
    <script src="https://dev.dam.so/_inc/ex/v4/plug/canvas.js"></script>

    <!-- Project Specific -->
    <link rel="stylesheet" href="./lay.css?v=2.0.0">
    <script src="./lay.js?v=2.0.0" defer></script>

    <meta property="og:title" data-i18n="meta_title" content="Woodnamu">
    <meta property="og:description" data-i18n="meta_description" content="전문화된 한 페이지 웹사이트를 제공합니다.">
    <meta property="og:url" content="https://woodnamu.com/docs/">
    <meta property="og:site_name" content="Woodnamu">
    <meta property="og:image" content="https://cdn.maxim.pe.kr/_image/seo/sigonggan/namecard.png">
    
    <title data-i18n="meta_title">Woodnamu</title>
</head>
<body>
    <nav class="damso-nav">
        <div class="damso-nav__container">
            <a href="#home" class="damso-nav__logo" data-i18n="home_title">WOODNAMU</a>
            <div class="damso-nav__buttons">
                <nav id="lang-switcher" class="damso-lang-switcher">
                    <a href="?lang=ko" class="damso-lang-btn active">KO</a>
                    <a href="?lang=en" class="damso-lang-btn">EN</a>
                </nav>
            </div>
        </div>
    </nav>

    <header id="home" class="damso-header">
        <div class="damso-header__content js-parallax-content">
            <h1 class="damso-header__title">WOODNAMU</h1>
            <p class="damso-header__description" data-i18n="home_subtitle"></p>
        </div>
    </header>

    <main>
        <section id="overview" class="damso-section">
            <div class="damso-container js-fade-in">
                <h2 class="damso-section__title">
                    <span translate="no" class="material-symbols-outlined notranslate">info</span>
                    <span data-i18n="overview_title">Overview</span>
                </h2>
                <p data-i18n="overview_desc" class="damso-section__description"></p>
                <div class="damso-grid damso-grid--cols-3">
                    <div class="damso-card"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_01_title"></h3> <p class="damso-card__description" data-i18n="overview_01_desc"></p> </div> </div>
                    <div class="damso-card"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_02_title"></h3> <p class="damso-card__description" data-i18n="overview_02_desc"></p> </div> </div>
                    <div class="damso-card"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_03_title"></h3> <p class="damso-card__description" data-i18n="overview_03_desc"></p> </div> </div>
                    <div class="damso-card damso-card--cloudflare"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_04_title"></h3> <p class="damso-card__description" data-i18n="overview_04_desc"></p> </div> </div>
                    <div class="damso-card damso-card--google"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_05_title"></h3> <p class="damso-card__description" data-i18n="overview_05_desc"></p> </div> </div>
                    <div class="damso-card damso-card--gemini"> <div class="damso-card__content"> <h3 class="damso-card__title" data-i18n="overview_06_title"></h3> <p class="damso-card__description" data-i18n="overview_06_desc"></p> </div> </div>
                </div>
            </div>
        </section>

        <section id="portfolio" class="damso-section">
            <div class="damso-container js-fade-in">
                <h2 class="damso-section__title">
                    <span translate="no" class="material-symbols-outlined notranslate">folder_special</span>
                    <span data-i18n="portfolio_title">Portfolio</span>
                </h2>
                <p data-i18n="portfolio_desc" class="damso-section__description"></p>
                <div class="damso-grid damso-grid--cols-2">
                    <a href="https://www.andar.kr" target="_blank" rel="noopener noreferrer" class="damso-gallery-link">
                        <div class="damso-card">
                            <div class="damso-card__image-wrapper"><img src="./section/portfolio/01.jpg" alt="Portfolio 1" class="damso-card__image"></div>
                            <div class="damso-card__content">
                                <h4 class="damso-card__title" data-i18n="portfolio_01_title"></h4>
                                <p class="damso-card__description" data-i18n="portfolio_01_desc"></p>
                            </div>
                        </div>
                    </a>
                    <a href="https://www.chuu.kr" target="_blank" rel="noopener noreferrer" class="damso-gallery-link">
                        <div class="damso-card">
                            <div class="damso-card__image-wrapper"><img src="./section/portfolio/02.jpg" alt="Portfolio 2" class="damso-card__image"></div>
                            <div class="damso-card__content">
                                <h4 class="damso-card__title" data-i18n="portfolio_02_title"></h4>
                                <p class="damso-card__description" data-i18n="portfolio_02_desc"></p>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <section id="promotion" class="damso-section">
            <div class="damso-container js-fade-in">
                <h2 class="damso-section__title">
                    <span translate="no" class="material-symbols-outlined notranslate">campaign</span>
                    <span data-i18n="promotion_title">Promotion</span>
                </h2>
                <p data-i18n="promotion_desc" class="damso-section__description render-as-html"></p>
                <div class="damso-grid damso-grid--cols-1">
                    <div class="damso-card damso-card--horizontal">
                        <div class="damso-card__image-wrapper">
                            <img src="./section/promotion/01.jpg" alt="Promotion 1" class="damso-card__image">
                        </div>
                        <div class="damso-card__content">
                            <span class="damso-card__tag" data-i18n="promotion_tag_event"></span>
                            <h3 class="damso-card__title" data-i18n="promotion_01_title"></h3>
                            <p class="damso-card__description render-as-html" data-i18n="promotion_01_desc"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="product" class="damso-section">
            <div class="damso-container js-fade-in">
                <h2 class="damso-section__title">
                    <span translate="no" class="material-symbols-outlined notranslate">shopping_bag</span>
                    <span data-i18n="product_title">Product</span>
                </h2>
                <p data-i18n="product_desc" class="damso-section__description"></p>

                <div class="damso-grid damso-grid--cols-2">
                    <!-- AI Plan Card -->
                    <div class="damso-card">
                        <span class="damso-card__badge" data-i18n="plan_ai_badge"></span>
                        <div class="damso-card__content">
                            <h3 class="damso-card__title" data-i18n="plan_ai_title_main"></h3>
                            <p class="damso-card__subtitle" data-i18n="plan_ai_title_sub"></p>
                            <p class="damso-card__description" data-i18n="plan_ai_desc"></p>
                            <!-- Specs Table (Simplified for Matte Theme) -->
                            <div class="damso-specs-table">
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_method"></span><span data-i18n="plan_ai_specs_value_method"></span></div>
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_text"></span><span data-i18n="plan_ai_specs_value_text"></span></div>
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_design"></span><span data-i18n="plan_ai_specs_value_design"></span></div>
                            </div>
                        </div>
                        <div class="damso-price-info">
                            <div class="damso-price-info__item">
                                <span class="damso-price-info__label" data-i18n="plan_price_setup_label"></span>
                                <span class="damso-price-info__value setup" data-i18n="plan_ai_price_setup_value"></span>
                            </div>
                            <div class="damso-price-info__item">
                                <span class="damso-price-info__label" data-i18n="plan_price_annual_label"></span>
                                <span class="damso-price-info__value" data-i18n="plan_ai_price_annual_value"></span>
                            </div>
                        </div>
                    </div>
                    <!-- Custom Plan Card -->
                    <div class="damso-card">
                        <div class="damso-card__content">
                            <h3 class="damso-card__title" data-i18n="plan_custom_title_main"></h3>
                            <p class="damso-card__subtitle" data-i18n="plan_custom_title_sub"></p>
                            <p class="damso-card__description" data-i18n="plan_custom_desc"></p>
                            <div class="damso-specs-table">
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_method"></span><span data-i18n="plan_custom_specs_value_method"></span></div>
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_text"></span><span data-i18n="plan_custom_specs_value_text"></span></div>
                                <div class="damso-specs-item"><span data-i18n="plan_specs_label_design"></span><span data-i18n="plan_custom_specs_value_design"></span></div>
                            </div>
                        </div>
                        <div class="damso-price-info">
                            <div class="damso-price-info__item">
                                <span class="damso-price-info__label" data-i18n="plan_price_setup_label"></span>
                                <span class="damso-price-info__value setup" data-i18n="plan_custom_price_setup_value"></span>
                            </div>
                            <div class="damso-price-info__item">
                                <span class="damso-price-info__label" data-i18n="plan_price_annual_label"></span>
                                <span class="damso-price-info__value" data-i18n="plan_custom_price_annual_value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="damso-faq-container">
                    <h3 class="damso-faq-title" data-i18n="faq_title"></h3>
                    <div class="damso-faq-list" data-content-type="faq" data-prefix="faq_item" data-dynamic-area></div>
                    <div class="damso-button-group">
                        <a data-i18n-href="faq_more_button_url" class="damso-btn" target="_blank" rel="noopener noreferrer">
                            <span data-i18n="faq_more_button_text"></span>
                        </a>
                   </div>
                </div>
            </div>
        </section>

        <section id="request" class="damso-section">
            <div class="damso-container js-fade-in">
                <h2 class="damso-section__title">
                    <span translate="no" class="material-symbols-outlined notranslate">mail</span>
                    <span data-i18n="request_title">Request</span>
                </h2>
                <p class="damso-section__description" data-i18n="request_desc"></p>
                <div class="damso-button-group">
                    <a data-i18n-href="request_button_1_url" class="damso-btn" target="_blank" rel="noopener noreferrer">
                        <span data-i18n="request_button_1_text"></span>
                    </a>
                    <a data-i18n-href="request_button_2_url" class="damso-btn" target="_blank" rel="noopener noreferrer">
                        <span data-i18n="request_button_2_text"></span>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="damso-footer">
        <div class="damso-container">
            <p class="render-as-html" data-i18n="ui_copyright_text"></p>
            <p><a data-i18n-href="ui_footer_credit_url" rel="noopener noreferrer" data-i18n="ui_footer_credit_text"></a></p>
        </div>
    </footer>

    <a href="#home" id="to-top-btn" class="hidden">
        <span translate="no" class="material-symbols-outlined notranslate">arrow_upward</span>
    </a>

</body>
</html>
